<!DOCTYPE html>
<html>
<head>
  <title>NYMA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      margin-top: 50px;
    }

 container.innerHTML += `
  <div class="card">
    <h3>${product.name}</h3>
    <p>₹${product.price}</p>
    <button onclick="addToCart('${product.name}', ${product.price}, '')">
      Add to Cart
    </button>
  </div>
`; 

 .product-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}   
    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  NYMA | <a href="cart.html">Cart 🛒 (<span id="cartCount">0</span>)</a>
</header>

<div class="hero">
  <h1>Luxury Streetwear</h1>
  <p>Redefining Style</p>
</div>

<div class="products" id="products"></div>

<script>
  async function loadProducts() {
    const res = await fetch("/products");
    const data = await res.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    data.forEach(product => {
      container.innerHTML += `
        <div class="card">
          <h3>${product.name}</h3>
          <p>₹${product.price}</p>
          <button onclick="addToCart('${product.name}')">Add to Cart</button>
        </div>
      `;
    });
  }

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  async function loadProducts() {
    const res = await fetch("/products");
    const data = await res.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    data.forEach(product => {
      container.innerHTML += `
        <div class="card">
          <img src="${product.image}" class="product-img"/>
          <h3>${product.name}</h3>
          <p>₹${product.price}</p>
          <button onclick="addToCart('${product.name}', ${product.price}, '${product.image}')">
            Add to Cart
          </button>
        </div>
      `;
    });
  }

  function addToCart(name, price, image) {
    const existing = cart.find(item => item.name === name);

    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ name, price, image, qty: 1 });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
  }

  function updateCartCount() {
    document.getElementById("cartCount").innerText =
      cart.reduce((sum, item) => sum + item.qty, 0);
  }

  loadProducts();
  updateCartCount();
</script>


</body>
</html>
