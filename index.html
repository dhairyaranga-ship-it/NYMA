<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NYMA</title>

<style>
body {
  margin:0;
  background:#0a0a0a;
  color:#fff;
  font-family:Arial;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #222;
}

.hero {
  height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:60px;
}

.hero p {
  color:#aaa;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  padding:50px;
}

.card {
  background:#111;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

.card img {
  width:100%;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  border:1px solid white;
  background:none;
  color:white;
  cursor:pointer;
}

button:hover {
  background:white;
  color:black;
}
</style>
</head>

<body>

<header>
  <h2>NYMA</h2>
  <div onclick="checkout()">Cart (<span id="count">0</span>)</div>
</header>

<section class="hero">
  <h1>Luxury Streetwear</h1>
  <p>Redefining Style</p>
</section>

<div class="products" id="products"></div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
let cart = [];

async function loadProducts(){
  const res = await fetch("/products");
  const data = await res.json();

  document.getElementById("products").innerHTML =
    data.map(p=>`
      <div class="card">
        <img src="https://source.unsplash.com/300x300/?sneakers">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
      </div>
    `).join("");
}

loadProducts();

function addToCart(name, price){
  cart.push({name, price});
  document.getElementById("count").innerText = cart.length;
}

async function checkout(){
  let total = cart.reduce((s,i)=>s+i.price,0);

  const res = await fetch("/create-order", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({amount: total, items: cart})
  });

  const order = await res.json();

  new Razorpay({
    key: "rzp_test_xxxxxx",
    amount: order.amount,
    currency: "INR",
    order_id: order.id,
    handler: function (){
      alert("Order Successful 🎉");
    }
  }).open();
}
</script>

</body>
</html>
