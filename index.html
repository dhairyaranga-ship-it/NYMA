<!DOCTYPE html>
<html>
<head>
  <title>NYMA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      margin-top: 50px;
    }

    container.innerHTML += `
  <div class="card">
    <img src="${product.image}" class="product-img"/>
    <h3>${product.name}</h3>
    <p>₹${product.price}</p>
    <button onclick="addToCart('${product.name}', ${product.price}, '${product.image}')">
      Add to Cart
    </button>
  </div>
`;

 .product-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}   
    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>NYMA</header>

<div class="hero">
  <h1>Luxury Streetwear</h1>
  <p>Redefining Style</p>
</div>

<div class="products" id="products"></div>

<script>
  async function loadProducts() {
    const res = await fetch("/products");
    const data = await res.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    data.forEach(product => {
      container.innerHTML += `
        <div class="card">
          <h3>${product.name}</h3>
          <p>₹${product.price}</p>
          <button onclick="addToCart('${product.name}')">Add to Cart</button>
        </div>
      `;
    });
  }

  function addToCart(name) {
    alert(name + " added to cart 🛒");
  }

  loadProducts();
</script>

</body>
</html>
